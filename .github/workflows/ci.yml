name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install
      - run: pnpm build

  test:
    runs-on: ubuntu-latest
    needs: ci

    strategy:
      fail-fast: false
      matrix:
        package: [dozor, dozor-react]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      # @kharko/dozor-react resolves @kharko/dozor via package.json#main → dist/.
      # Each matrix job runs in a fresh checkout, so build the workspace once
      # before tests so cross-package imports resolve.
      - run: pnpm build

      - run: pnpm -F @kharko/${{ matrix.package }} test
